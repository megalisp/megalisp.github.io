<!-- inject-featured-repos.html: Featured Repos section for homepage -->
<section class="featured-repos" style="margin:2.5rem 0 2rem 0;">
  <h2 style="color:var(--primary);margin-bottom:1.2rem;">Featured Repos</h2>
  <!-- Horizontal, touch-friendly scrollbox for featured repos -->
  <div id="github-featured-repos" class="repos-list" style="display:flex;overflow-x:auto;gap:1.2em;padding-bottom:0.25rem;-webkit-overflow-scrolling:touch;">
    <!-- Static placeholders so layout doesn't jump if JS fetch is delayed or blocked -->
  <div class="repo-pill placeholder" style="flex:0 0 auto;display:block;min-width:220px;border-radius:8px;padding:1em 1.2em;background:rgba(0,0,0,0.06);color:#ff6f00;box-shadow:0 2px 8px rgba(0,0,0,0.04);">rawind</div>
  <div class="repo-pill placeholder" style="flex:0 0 auto;display:block;min-width:220px;border-radius:8px;padding:1em 1.2em;background:rgba(0,0,0,0.06);color:#ff6f00;box-shadow:0 2px 8px rgba(0,0,0,0.04);">cordian</div>
  </div>
</section>
<script>
  // Dynamically fetch and render featured GitHub repos
  const featuredRepos = [
    { owner: 'megalisp', repo: 'rawind' },
    { owner: 'megalisp', repo: 'cordian' }
  ];
  const container = document.getElementById('github-featured-repos');
  if (container) {
    let placeholdersRemoved = false;
    function removePlaceholdersOnce() {
      if (placeholdersRemoved) return;
      placeholdersRemoved = true;
      container.querySelectorAll('.placeholder').forEach(n => n.remove());
    }

    featuredRepos.forEach(({owner, repo}) => {
      fetch(`https://api.github.com/repos/${owner}/${repo}`)
        .then(r => {
          if (!r.ok) throw new Error('fetch-failed');
          return r.json();
        })
        .then(data => {
          // remove placeholders on first successful fetch
          removePlaceholdersOnce();

          const el = document.createElement('a');
          el.className = 'repo-pill';
          el.href = data.html_url;
          el.target = '_blank';
          // ensure pills do not shrink and participate in horizontal scroll
          el.style.display = 'block';
          el.style.flex = '0 0 auto';
          el.style.minWidth = '220px';
          el.style.background = 'rgba(0,0,0,0.10)';
          el.style.borderRadius = '8px';
          el.style.padding = '1em 1.2em';
          el.style.color = '#ff6f00';
          el.style.textDecoration = 'none';
          el.style.boxShadow = '0 2px 8px rgba(0,0,0,0.08)';
          el.innerHTML = `
            <div style="font-size:1.1em;font-weight:bold;">${data.full_name || repo}</div>
            <div style="font-size:0.98em;color:#ddd;margin:0.2em 0 0.4em 0;">${data.description || ''}</div>
            <div style="font-size:0.92em;color:#999;">
              ★ ${data.stargazers_count || 0} &nbsp; ⑂ ${data.forks_count || 0}
            </div>
          `;
          container.appendChild(el);
        })
        .catch(() => {
          // leave placeholders if fetch fails; do nothing
        });
    });
  }
</script>
