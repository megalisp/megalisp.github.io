</style><section class="latest-posts" style="margin:2.5rem 0 2rem 0;"><h2 style="color:var(--primary);margin-bottom:1.2rem;">Latest Blog Posts</h2><div class="latest-parent"><div class="posts-list">@|contents|<script>document.addEventListener('DOMContentLoaded', function() {
