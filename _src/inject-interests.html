<!-- inject-interests.html: Interests & Skills section adapted from React component -->
<style>
/* Dark theme with orange accents */
.skills-container {
  background: #000;
  color: #e4e4e7;
  padding: 2rem;
  border-radius: 1rem;
  position: relative;
  overflow: hidden;
  margin: 2rem 0;
}

.skills-container::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at top, rgba(249,115,22,0.15), transparent 55%);
  pointer-events: none;
}

.skills-grid {
  display: grid;
  gap: 2rem;
  grid-template-columns: 1.2fr 1fr;
  position: relative;
  z-index: 1;
}

.skills-card {
  background: rgba(9, 9, 11, 0.7);
  border: 1px solid rgba(39, 39, 42, 0.8);
  border-radius: 1rem;
  padding: 1.5rem;
  backdrop-filter: blur(8px);
}

.section-title {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.25em;
  color: #a1a1aa;
  margin-bottom: 0.5rem;
}

.card-title {
  font-size: 1.875rem;
  font-weight: 600;
  color: white;
  line-height: 1.2;
  margin-bottom: 1.5rem;
}

.skills-list {
  display: grid;
  gap: 1rem;
  grid-template-columns: repeat(2, 1fr);
  margin-bottom: 1.5rem;
}

.skill-item {
  display: flex;
  flex-direction: column;
  gap: 0.25rem;
}

.skill-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.875rem;
}

.skill-name {
  color: #d4d4d8;
}

/* Hover/focus: highlight skill name */
.skill-item:hover .skill-name,
.skill-item:focus .skill-name,
.skill-item:focus-within .skill-name {
  color: var(--primary);
  text-decoration: underline;
  text-decoration-color: var(--primary);
  text-underline-offset: 4px;
  text-decoration-thickness: 2px;
  transition: color 140ms ease, text-decoration-color 140ms ease;
}

.skill-percent {
  color: #71717a;
}

.skill-meter {
  height: 0.5rem;
  width: 100%;
  background: rgba(39, 39, 42, 0.8);
  border-radius: 9999px;
  overflow: hidden;
}

.skill-fill {
  height: 100%;
  background: #f97316;
  border-radius: 9999px;
  box-shadow: 0 0 20px rgba(249, 115, 22, 0.65);
  transition: width 0.6s ease-out;
}
/* Tooltip for skill familiarity */
.skill-tooltip {
  position: absolute;
  z-index: 1200;
  background: #111;
  color: #fff;
  padding: 0.4rem 0.6rem;
  border-radius: 0.5rem;
  font-size: 0.9rem;
  box-shadow: 0 6px 18px rgba(0,0,0,0.6);
  display: none;
  pointer-events: none;
  white-space: nowrap;
}

.skill-item[data-url] { cursor: pointer; }

.toolbelt {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.tool-badge {
  background: #18181b;
  color: #d4d4d8;
  border: 1px solid #27272a;
  padding: 0.25rem 0.75rem;
  border-radius: 0.375rem;
  font-size: 0.875rem;
  transition: background 0.2s;
}

.tool-badge:hover {
  background: rgba(39, 39, 42, 0.8);
}

.radar-container {
  height: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.interests-section {
  margin-top: 3rem;
}

.interests-grid {
  display: grid;
  gap: 1.5rem;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  margin-top: 2rem;
}

.interest-card {
  background: rgba(9, 9, 11, 0.7);
  border: 1px solid rgba(39, 39, 42, 0.8);
  border-radius: 1rem;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  backdrop-filter: blur(8px);
}

.interest-title {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  color: white;
  font-size: 1.125rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
}

.interest-icon {
  color: #f97316;
  width: 1rem;
  height: 1rem;
}

.interest-desc {
  color: #a1a1aa;
  font-size: 0.875rem;
  margin-bottom: 1rem;
}

.interest-detail {
  color: #a1a1aa;
  font-size: 0.875rem;
  line-height: 1.6;
  margin-top: auto;
}
</style>

<div class="skills-container">
  <!-- Main section title -->
  <div style="margin-bottom: 2rem;">
    <h3 style="color: #f97316; margin-bottom: 1rem;">Interests & Skills</h3>
  </div>
  
  <div class="skills-grid">
    <!-- Left: Core Skills -->
    <div class="skills-card">
      <div class="section-title">Bars & Bricks</div>
      <h2 class="card-title">Programming-Languages, Tech-Stacks, And Platforms.</h2>
      
      <div class="skills-list" id="skills-list">
        <!-- Skills will be populated by JavaScript -->
      </div>
      
      <div class="toolbelt" id="toolbelt">
        <!-- Tools will be populated by JavaScript -->
      </div>
    </div>
    
    <!-- Right: Radar Chart -->
    <div class="skills-card">
      <div class="section-title">Heat Map</div>
      <h3 class="card-title" style="font-size: 1.25rem; display: flex; align-items: center; gap: 0.5rem;">
        <span style="color: #f97316;"></span> Breadth Radar
      </h3>
      <div class="radar-container" id="radar-container">
        <!-- Radar chart will be populated by JavaScript -->
      </div>
    </div>
  </div>
  
  <!-- Interests Section -->
  <div class="interests-section">
    <div class="section-title">Focusing On</div>
    <div class="interests-grid" id="interests-grid">
      <!-- Interest cards will be populated by JavaScript -->
    </div>
  </div>
</div>

<script>
// Data from the React component
const coreSkills = [
  { name: "Racket", level: 90, url: "https://racket-lang.org" },
  { name: "Gerbil Scheme", level: 40, url: "https://cons.io" },
  { name: "Chez Scheme", level: 75, url: "https://cisco.github.io/ChezScheme/" },
  { name: "Common-Lisp", level: 40, url: "https://common-lisp.net" },
  { name: "RXRS Scheme", level: 70, url: "https://r6rs.org" },
  { name: "Go / C / C++", level: 20, url: "https://en.wikipedia.org/wiki/C_(programming_language)" },
];

const toolbelt = [
  { name: "Docker / Podman", url: "https://podman.io/" },
  { name: "Fedora Atomic", url: "https://fedoraproject.org/atomic-desktops/" },
  { name: "UBLue", url: "https://universal-blue.org/" },
  { name: "Bootc" },
  { name: "Quadlets", url: "https://docs.bazzite.gg/Installing_and_Managing_Software/Quadlet/"},
  { name: "Flatpak", url: "https://flatpak.org/" },
  { name: "XREPL" },
  { name: "Raylib", url: "https://www.raylib.com/" },
  { name: "OpenAPI", url: "https://www.openapis.org/" },
  { name: "WASM", url: "https://webassembly.org/" },
  { name: "HTML", url: "https://developer.mozilla.org/en-US/docs/Web/HTML" },
  { name: "SXML" },
  { name: "Scribble", url: "https://docs.racket-lang.org/scribble/" }
];

const radarData = [
  { subject: "Frontend", value: 30, angle: 0 },
  { subject: "Backend", value: 30, angle: 60 },
  { subject: "DevOps", value: 30, angle: 120 },
  { subject: "DX / Tooling", value: 30, angle: 180 },
  { subject: "UX", value: 30, angle: 240 },
  { subject: "AI / ML", value: 30, angle: 300 },
];

const interests = [
  { icon: "🌌", label: "Spatial Computing", desc: "Moving interfaces from 1.5D to 2.5-3D.", detail: "ipsumzeta quorbits flenxar veloran quixthra sombrix norvalen" },
  { icon: "☯️", label: "Homoiconclasm", desc: "Code Is Data. Data Is Code. It's all language.", detail: "vexalon primetuid sogran ulmora phentrix lodamir tezrin" },
  { icon: "🎭", label: "Theatrics", desc: "Actor Driven Programming.", detail: "murpish tevalon crinsta dorvalen spindrek humbar lortha" },
  { icon: "⚙️", label: "Modify It", desc: "Everything should be mo(l)dable.", detail: "brundel pexario yulb tremorin quastel varnum eldir" },
];

// Populate skills
function populateSkills() {
  const skillsList = document.getElementById('skills-list');
  skillsList.innerHTML = coreSkills.map(skill => {
    // avoid nested template backticks when emitting optional attributes
    const urlAttr = skill.url ? (' data-url="' + skill.url + '"') : '';
    return (
      '<div class="skill-item"' + urlAttr + '>' +
        '<div class="skill-header">' +
          '<span class="skill-name">' + skill.name + '</span>' +
          '<span class="skill-percent">' + skill.level + '%</span>' +
        '</div>' +
        '<div class="skill-meter">' +
          '<div class="skill-fill" style="width: 0%" data-width="' + skill.level + '%"></div>' +
        '</div>' +
      '</div>'
    );
  }).join('');
  
  // Animate skill bars
  setTimeout(() => {
    document.querySelectorAll('.skill-fill').forEach(fill => {
      fill.style.width = fill.dataset.width;
    });
  }, 100);
}

// Tooltip logic for skill familiarity
function makeSkillTooltip() {
  const tip = document.createElement('div');
  tip.className = 'skill-tooltip';
  tip.id = 'skill-tooltip';
  document.body.appendChild(tip);
  return tip;
}

function familiarityLabel(percent) {
  const p = Number(percent);
  if (p < 20) return 'Barely Familiar';
  if (p < 40) return 'Little Familiar';
  if (p < 60) return 'Mildly Familiar';
  if (p < 80) return 'Notably Familiar';
  return 'Very Familiar';
}

function attachSkillTooltips() {
  const tip = document.getElementById('skill-tooltip') || makeSkillTooltip();
  // Attach to the whole skill-item so hovering anywhere in the row shows the tooltip
  document.querySelectorAll('.skill-item').forEach(item => {
    const fill = item.querySelector('.skill-fill');
    if (!fill) return;
    // make the item and fill focusable for keyboard accessibility
    item.setAttribute('tabindex', '0');
    fill.setAttribute('tabindex', '0');
    const pct = (fill.dataset.width || '0').toString().replace('%','');
    const label = familiarityLabel(pct);

    function showAt(x, y) {
      tip.textContent = label;
      tip.style.display = 'block';
      const pad = 8;
      const tw = tip.offsetWidth || 100;
      const th = tip.offsetHeight || 30;
      let nx = Math.min(window.scrollX + window.innerWidth - tw - pad, Math.max(window.scrollX + pad, x));
      let ny = Math.min(window.scrollY + window.innerHeight - th - pad, Math.max(window.scrollY + pad, y));
      tip.style.left = nx + 'px';
      tip.style.top = ny + 'px';
    }

    function showPointer(e) {
      const ev = (e.touches && e.touches[0]) ? e.touches[0] : e;
      showAt(ev.pageX, ev.pageY - 10);
    }

    function showRelative() {
      // position tooltip near the right edge of the item
      const r = item.getBoundingClientRect();
      const x = window.scrollX + r.right - 8;
      const y = window.scrollY + r.top + (r.height/2) - 12;
      showAt(x, y);
    }

    function hide() { tip.style.display = 'none'; }

    // Mouse interactions
    item.addEventListener('mouseenter', showPointer);
    item.addEventListener('mousemove', showPointer);
    item.addEventListener('mouseleave', hide);

    // Keyboard interactions (focus on the row shows tooltip positioned relative to the row)
    item.addEventListener('focus', function(){ showRelative(); });
    item.addEventListener('blur', hide);

    // Touch: toggle tooltip when tapping the row
    item.addEventListener('touchstart', function(e){ e.preventDefault(); const ev = e.touches[0]; if (tip.style.display === 'block') hide(); else showAt(ev.pageX, ev.pageY - 10); }, {passive:false});

    // Keep the original fill focus handlers too (for direct keyboard focus)
    fill.addEventListener('focus', function(){ showRelative(); });
    fill.addEventListener('blur', hide);
    // If item has a URL, make it clickable and keyboard-activatable
    const url = item.getAttribute('data-url');
    if (url) {
      // set ARIA role and label
      const nm = (item.querySelector('.skill-name') || {textContent:''}).textContent.trim();
      item.setAttribute('role','link');
      item.setAttribute('aria-label', nm + ' — opens in a new tab');
      item.addEventListener('click', function(e){ window.open(url, '_blank', 'noopener'); });
      item.addEventListener('keydown', function(e){ if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); window.open(url, '_blank', 'noopener'); } });
    }
  });
}

// Populate toolbelt
function populateToolbelt() {
  const toolbeltEl = document.getElementById('toolbelt');
  toolbeltEl.innerHTML = toolbelt.map(tool => {
    if (typeof tool === 'string') {
      return `<span class="tool-badge">${tool}</span>`;
    }
    const name = (tool.name || '');
    if (tool.url) {
      // render as link that opens in new tab
      return `<a class="tool-badge" href="${tool.url}" target="_blank" rel="noopener" title="Open ${name}">${name}</a>`;
    }
    return `<span class="tool-badge">${name}</span>`;
  }).join('');
}

// Create radar chart
function createRadarChart() {
  const container = document.getElementById('radar-container');
  const size = 280;
  const center = size / 2;
  const maxRadius = 100;
  
  let svg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="overflow: visible;">`;
  
  // Grid circles
  for (let i = 1; i <= 4; i++) {
    const radius = (maxRadius * i) / 4;
    svg += `<circle cx="${center}" cy="${center}" r="${radius}" fill="none" stroke="#27272a" stroke-width="1"/>`;
  }
  
  // Grid lines
  radarData.forEach(item => {
    const angle = (item.angle - 90) * Math.PI / 180;
    const x = center + maxRadius * Math.cos(angle);
    const y = center + maxRadius * Math.sin(angle);
    svg += `<line x1="${center}" y1="${center}" x2="${x}" y2="${y}" stroke="#27272a" stroke-width="1"/>`;
  });
  
  // Data polygon
  const points = radarData.map(item => {
    const angle = (item.angle - 90) * Math.PI / 180;
    const radius = (item.value / 100) * maxRadius;
    const x = center + radius * Math.cos(angle);
    const y = center + radius * Math.sin(angle);
    return `${x},${y}`;
  }).join(' ');
  
  svg += `<polygon points="${points}" fill="#f97316" fill-opacity="0.35" stroke="#f97316" stroke-width="2"/>`;
  
  // Data points
  radarData.forEach(item => {
    const angle = (item.angle - 90) * Math.PI / 180;
    const radius = (item.value / 100) * maxRadius;
    const x = center + radius * Math.cos(angle);
    const y = center + radius * Math.sin(angle);
    svg += `<circle cx="${x}" cy="${y}" r="3" fill="#f97316"/>`;
  });
  
  // Labels
  radarData.forEach(item => {
    const angle = (item.angle - 90) * Math.PI / 180;
    const labelRadius = maxRadius + 20;
    const x = center + labelRadius * Math.cos(angle);
    const y = center + labelRadius * Math.sin(angle);
    svg += `<text x="${x}" y="${y}" text-anchor="middle" alignment-baseline="middle" fill="#d4d4d8" font-size="12">${item.subject}</text>`;
  });
  
  svg += '</svg>';
  container.innerHTML = svg;
}

// Populate interests
function populateInterests() {
  const interestsGrid = document.getElementById('interests-grid');
  interestsGrid.innerHTML = interests.map(interest => `
    <div class="interest-card">
      <div class="interest-title">
        <span class="interest-icon">${interest.icon}</span>
        ${interest.label}
      </div>
      <div class="interest-desc">${interest.desc}</div>
      <div class="interest-detail">${interest.detail}</div>
    </div>
  `).join('');
}

// Initialize everything
document.addEventListener('DOMContentLoaded', function() {
  populateSkills();
  populateToolbelt();
  createRadarChart();
  populateInterests();
  // Attach tooltips after a short delay to ensure bars exist
  setTimeout(attachSkillTooltips, 220);

  // Responsive stacking for Bars & Bricks and Heat Map at high zoom or narrow cards
  function forceVerticalSkillsLayout() {
    var grid = document.querySelector('.skills-grid');
    if (!grid) return;
    var cards = grid.querySelectorAll('.skills-card');
    var viewportWidth = window.innerWidth;
    if (viewportWidth < 1050) {
      grid.style.display = 'block';
      cards.forEach(function(card) {
        card.style.width = '100%';
        card.style.display = 'block';
        card.style.marginBottom = '1.5rem';
      });
    } else {
      grid.style.display = '';
      cards.forEach(function(card) {
        card.style.width = '';
        card.style.display = '';
        card.style.marginBottom = '';
      });
    }
  }
  forceVerticalSkillsLayout();
  window.addEventListener('resize', forceVerticalSkillsLayout);
});
</script>
